<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dane dokumentu</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fb; color: #222; margin: 40px; }
    .token { font-size: 18px; color: #b71c1c; margin-bottom: 20px; }
    .data { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px #0001; }
    .data-row { margin-bottom: 10px; }
    .label { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Dane dokumentu</h2>
  <div class="token"><span class="label">Token:</span> 1234567890abcdef</div>
  <div class="data">
    <div class="data-row"><span class="label">Imię:</span> Jan</div>
    <div class="data-row"><span class="label">Nazwisko:</span> Kowalski</div>
    <div class="data-row"><span class="label">PESEL:</span> 12345678901</div>
    <div class="data-row"><span class="label">Obywatelstwo:</span> Polska</div>
    <div class="data-row"><span class="label">Data urodzenia:</span> 1990-01-01</div>
    <!-- Dodaj kolejne pola według potrzeb -->
  </div>
</body>
</html>
